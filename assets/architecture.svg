<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3748" />
      <stop offset="100%" stop-color="#1a202c" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#63b3ed" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#48bb78" />
    </marker>
  </defs>
  <rect width="800" height="400" fill="#0f172a" rx="16" />
  
  <!-- Frontend Box -->
  <rect x="50" y="100" width="200" height="200" fill="url(#boxBg)" stroke="#4a5568" stroke-width="2" rx="8" />
  <text x="150" y="140" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Frontend (React)</text>
  <text x="150" y="180" font-family="sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">Webcam Capture</text>
  <text x="150" y="210" font-family="sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">FaceLandmarker</text>
  <text x="150" y="240" font-family="sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">WebGL Shaders</text>

  <!-- Backend Box -->
  <rect x="550" y="100" width="200" height="200" fill="url(#boxBg)" stroke="#4a5568" stroke-width="2" rx="8" />
  <text x="650" y="140" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Backend (FastAPI)</text>
  <text x="650" y="180" font-family="sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">SignalProcessor</text>
  <text x="650" y="210" font-family="sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">SciPy Filtering</text>
  <text x="650" y="240" font-family="sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">BPM Estimation</text>

  <!-- Connections -->
  <path d="M 260 160 L 535 160" fill="none" stroke="#63b3ed" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.5s" repeatCount="indefinite" />
  </path>
  <text x="400" y="150" font-family="sans-serif" font-size="14" fill="#63b3ed" text-anchor="middle">WebSocket (RGB ROIs)</text>

  <path d="M 540 240 L 265 240" fill="none" stroke="#48bb78" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowGreen)">
    <animate attributeName="stroke-dashoffset" from="0" to="10" dur="0.5s" repeatCount="indefinite" />
  </path>
  <text x="400" y="230" font-family="sans-serif" font-size="14" fill="#48bb78" text-anchor="middle">WebSocket (BPM &amp; Status)</text>
</svg>