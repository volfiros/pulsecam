<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0" />
      <stop offset="50%" stop-color="#34d399" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="url(#bg)" />
  <path d="M 0 100 Q 100 100, 200 100 T 350 100 L 380 50 L 420 160 L 450 100 T 600 100 T 800 100" fill="none" stroke="url(#wave)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1000" stroke-dashoffset="1000">
    <animate attributeName="stroke-dashoffset" values="1000;0" dur="2s" repeatCount="indefinite" />
  </path>
  <circle cx="420" cy="160" r="4" fill="#34d399">
    <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="380" cy="50" r="4" fill="#34d399">
    <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite" begin="0.5s" />
  </circle>
  <text x="400" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">PulseCam</text>
  <text x="400" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="normal" fill="#a78bfa" text-anchor="middle">Your Pulse, From Your Camera</text>
</svg>